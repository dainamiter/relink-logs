name: Build Portable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install nightly Rust
        shell: bash
        run: |
          rustup set auto-self-update disable
          rustup update nightly && rustup default nightly

      - name: Install npm dependencies
        run: npm ci

      - name: Build hook DLL
        run: cargo build --release --package hook

      - name: Stage hook.dll
        shell: bash
        run: cp target/release/hook.dll src-tauri/hook.dll

      - name: Build App (Skip Installer)
        # --bundles none 意思是跳过所有签名和自动更新程序，只要纯净 exe
        run: npx @tauri-apps/cli build --bundles none

      - name: Upload EXE and DLL
        uses: actions/upload-artifact@v4
        with:
          name: GBFR-Logs-Portable
          # 把所有可能的生成目录全部抓一遍，绝不漏掉
          path: |
            target/release/*.exe
            src-tauri/target/release/*.exe
            target/release/hook.dll
            src-tauri/hook.dll
